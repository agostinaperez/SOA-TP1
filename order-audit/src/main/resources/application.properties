# =========================
# CONFIGURACIÓN KAFKA
# =========================
# Dirección del broker Kafka
# Es el punto de entrada al cluster Kafka.
# En Docker suele ser el nombre del servicio (ej: kafka:9092)
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}

# ID del consumer group
# Define la identidad lógica del consumidor.
# Kafka guarda offsets por group-id.
# IMPORTANTE:
# - Cada microservicio debe tener un group distinto
# - Permite fan-out (varios servicios consumen el mismo evento)
spring.kafka.consumer.group-id=${GROUP_ID:order-audit-group}

# Política cuando no existe offset previo
# earliest → consume desde el inicio del topic (permite reprocesar)
# latest → consume solo mensajes nuevos
# Para el TP se usa earliest (demuestra tolerancia a caídas)
spring.kafka.consumer.auto-offset-reset=${AUTO_OFFSET_RESET:earliest}

# Deserializador de la key
# Convierte la key del mensaje Kafka (bytes) a String
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Deserializador del value
# Convierte el JSON recibido en un objeto Java usando Jackson
# (ej: OrderValidated)
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Paquetes confiables para deserialización JSON
# Evita errores de seguridad de Jackson al instanciar objetos
# "*" permite todos (válido para TP, en producción se restringe)
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Evita que la aplicación falle si el topic aún no existe
# Útil cuando Kafka arranca después del servicio
spring.kafka.listener.missing-topics-fatal=false

# (Opcional pero recomendado)
# Permite ignorar headers de tipo en mensajes
# Evita problemas si producer y consumer no comparten exactamente el mismo paquete/clase
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# Definir la clase destino por defecto para el JSON
spring.kafka.consumer.properties.spring.json.value.default.type=com.tp.kafka.order_audit.model.OrderValidated
# =========================
# CONFIGURACIÓN DE LOGS
# =========================

# Nivel global de logs
# INFO → muestra eventos normales del sistema
logging.level.root=${LOGGING_LEVEL:INFO}
